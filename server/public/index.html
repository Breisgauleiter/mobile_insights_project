<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mobile Insights</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f0f23;
      color: #e0e0e0;
      min-height: 100vh;
    }

    header {
      background: #1e1e3a;
      padding: 20px 24px;
      border-bottom: 2px solid #6c5ce7;
    }

    header h1 {
      font-size: 22px;
      color: #fff;
      font-weight: 700;
    }

    header p {
      font-size: 13px;
      color: #a0a0c0;
      margin-top: 4px;
    }

    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    /* Upload area */
    .upload-zone {
      border: 2px dashed #6c5ce7;
      border-radius: 12px;
      padding: 48px 24px;
      text-align: center;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      margin-bottom: 24px;
    }

    .upload-zone:hover, .upload-zone.dragover {
      background: rgba(108, 92, 231, 0.1);
      border-color: #a29bfe;
    }

    .upload-zone .icon { font-size: 48px; margin-bottom: 12px; }
    .upload-zone .label { font-size: 16px; color: #a0a0c0; }
    .upload-zone .hint { font-size: 12px; color: #636e72; margin-top: 8px; }

    .upload-zone input[type="file"] { display: none; }

    /* Progress bar */
    .progress-wrap {
      display: none;
      margin-bottom: 24px;
    }

    .progress-wrap.active { display: block; }

    .progress-bar {
      height: 6px;
      background: #1e1e3a;
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-bar .fill {
      height: 100%;
      background: #6c5ce7;
      width: 0%;
      transition: width 0.3s;
    }

    .progress-text {
      font-size: 12px;
      color: #a0a0c0;
      margin-top: 6px;
    }

    /* Section headings */
    h2 {
      font-size: 16px;
      color: #fff;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid #1e1e3a;
    }

    /* Upload list */
    .uploads-list {
      list-style: none;
      margin-bottom: 24px;
    }

    .uploads-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: #1a1a2e;
      border-radius: 8px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .uploads-list li:hover { background: #252545; }

    .upload-btn {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      background: none;
      border: none;
      color: inherit;
      font: inherit;
      cursor: pointer;
      padding: 0;
    }

    .uploads-list .name {
      font-size: 13px;
      color: #e0e0e0;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      margin-right: 12px;
    }

    .badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 6px;
      text-transform: uppercase;
    }

    .badge.done { background: #00b894; color: #fff; }
    .badge.processing { background: #fdcb6e; color: #1e1e3a; }
    .badge.pending { background: #74b9ff; color: #1e1e3a; }
    .badge.error { background: #d63031; color: #fff; }
    .badge.unknown { background: #636e72; color: #fff; }

    /* ML processing progress */
    .ml-progress {
      padding: 24px;
      text-align: center;
    }

    .ml-progress .stage-label {
      font-size: 13px;
      color: #a0a0c0;
      margin-bottom: 10px;
    }

    .ml-progress .bar-track {
      height: 8px;
      background: #1e1e3a;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .ml-progress .bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #6c5ce7, #a29bfe);
      border-radius: 4px;
      transition: width 0.4s ease;
    }

    .ml-progress .pct-label {
      font-size: 22px;
      font-weight: 700;
      color: #6c5ce7;
    }

    .ml-progress .eta-label {
      font-size: 12px;
      color: #636e72;
      margin-top: 4px;
    }

    /* Results panel */
    .results-panel {
      display: none;
      background: #1a1a2e;
      border-radius: 12px;
      padding: 20px;
    }

    .results-panel.active { display: block; }

    .results-panel h3 {
      font-size: 14px;
      color: #fff;
      margin-bottom: 12px;
    }

    .results-panel .close-btn {
      background: none;
      border: none;
      color: #636e72;
      font-size: 18px;
      cursor: pointer;
    }

    .results-panel .close-btn:hover { color: #fff; }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 4px;
      margin-bottom: 4px;
    }

    .icon-btn {
      background: none;
      border: none;
      color: #636e72;
      cursor: pointer;
      font-size: 14px;
      padding: 4px 6px;
      border-radius: 4px;
    }

    .icon-btn:hover { color: #fff; background: rgba(255,255,255,0.05); }
    .icon-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .highlight-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: #0f0f23;
      border-radius: 8px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .highlight-card .time {
      font-size: 20px;
      font-weight: 700;
      color: #6c5ce7;
      min-width: 70px;
    }

    .highlight-card .score-bar {
      flex: 1;
      height: 8px;
      background: #1e1e3a;
      border-radius: 4px;
      overflow: hidden;
    }

    .highlight-card .score-bar .fill {
      height: 100%;
      background: linear-gradient(90deg, #6c5ce7, #a29bfe);
      border-radius: 4px;
    }

    .highlight-card .score-val {
      font-size: 13px;
      color: #a0a0c0;
      min-width: 32px;
      text-align: right;
    }

    .highlight-card .type-badge {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .type-badge.type-kill,
    .type-badge.type-double_kill,
    .type-badge.type-triple_kill,
    .type-badge.type-maniac,
    .type-badge.type-savage { background: #e74c3c33; color: #ff6b6b; }

    .type-badge.type-action { background: #6c5ce733; color: #a29bfe; }
    .type-badge.type-effect { background: #f39c1233; color: #fdcb6e; }
    .type-badge.type-lord,
    .type-badge.type-turtle { background: #00b89433; color: #55efc4; }

    .highlight-card .sources {
      font-size: 10px;
      color: #636e72;
    }

    .no-highlights {
      text-align: center;
      color: #636e72;
      padding: 24px;
      font-size: 14px;
    }

    .status-msg {
      text-align: center;
      color: #a0a0c0;
      padding: 16px;
      font-size: 13px;
    }

    .empty-state {
      text-align: center;
      color: #636e72;
      padding: 24px 0;
      font-size: 14px;
    }

    /* Video player */
    .video-wrap {
      margin-bottom: 0;
      border-radius: 0 0 8px 8px;
      overflow: hidden;
      background: #000;
    }

    .video-wrap video {
      width: 100%;
      display: block;
      max-height: 400px;
    }

    #videoAnnotationSection {
      margin-bottom: 16px;
      border-radius: 8px;
      overflow: hidden;
    }

    #videoContainer {
      position: relative;
    }

    /* Annotation toolbar */
    .annotation-toolbar {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 4px;
      padding: 8px 10px;
      background: #1e1e3a;
      border-bottom: 1px solid #2a2a4a;
    }

    .annotation-toolbar.drawing-on {
      border-bottom-color: #6c5ce7;
    }

    .ann-btn {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      color: #e0e0e0;
      border-radius: 5px;
      padding: 4px 9px;
      cursor: pointer;
      font-size: 13px;
      line-height: 1.4;
      transition: background 0.15s, border-color 0.15s;
    }

    .ann-btn:hover { background: rgba(108,92,231,0.25); border-color: #6c5ce7; }
    .ann-btn.active { background: #6c5ce7; border-color: #6c5ce7; color: #fff; }
    .ann-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .ann-color-swatch {
      display: inline-block;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      flex-shrink: 0;
      transition: border-color 0.15s, transform 0.15s;
    }

    .ann-color-swatch:hover { transform: scale(1.2); }
    .ann-color-swatch.active { border-color: #fff; }

    .ann-separator {
      width: 1px;
      height: 22px;
      background: rgba(255,255,255,0.15);
      flex-shrink: 0;
      margin: 0 2px;
    }

    /* Canvas overlay */
    #annotationCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      touch-action: none;
      pointer-events: none;
    }

    #annotationCanvas.drawing-on {
      cursor: crosshair;
      pointer-events: auto;
    }

    .highlight-card:hover {
      background: #1a1a2e;
    }
  </style>
</head>
<body>
  <header>
    <h1>&#127918; Mobile Insights</h1>
    <p>Upload gameplay videos &mdash; get highlights automatically</p>
  </header>

  <main>
    <!-- Upload -->
    <div class="upload-zone" id="uploadZone">
      <div class="icon">&#128249;</div>
      <div class="label">Drop a video here or click to browse</div>
      <div class="hint">MP4, MOV, AVI &bull; max 500 MB</div>
      <input type="file" id="fileInput" accept="video/*">
    </div>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar"><div class="fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">Uploading...</div>
    </div>

    <!-- Results panel -->
    <div class="results-panel" id="resultsPanel">
      <div class="panel-header">
        <button class="icon-btn" id="exportAllBtn" title="Export all clips as zip" disabled>&#x1F4E6; Export all</button>
        <button class="icon-btn" id="reprocessBtn" title="Reprocess" disabled>&#x1F504;</button>
        <button class="close-btn" id="closeResults">&times;</button>
      </div>
      <h3 id="resultsTitle">Results</h3>
      <div id="videoAnnotationSection" style="display:none">
        <div id="annotationToolbar" class="annotation-toolbar">
          <button id="drawToggleBtn" class="ann-btn" title="Toggle drawing mode">&#x1F58A;&#xFE0F; Draw</button>
          <div class="ann-separator"></div>
          <button class="ann-btn ann-tool-btn active" data-tool="freehand" title="Freehand pen">&#x270F;&#xFE0F;</button>
          <button class="ann-btn ann-tool-btn" data-tool="arrow" title="Arrow">&#x27A1;&#xFE0F;</button>
          <button class="ann-btn ann-tool-btn" data-tool="circle" title="Circle">&#x2B55;</button>
          <button class="ann-btn ann-tool-btn" data-tool="rect" title="Rectangle">&#x2B1C;</button>
          <button class="ann-btn ann-tool-btn" data-tool="text" title="Text">&#x1F524;</button>
          <div class="ann-separator"></div>
          <span class="ann-color-swatch active" data-color="#ff3333" style="background:#ff3333" title="Red" aria-label="Color: Red" role="button" tabindex="0"></span>
          <span class="ann-color-swatch" data-color="#ffdd00" style="background:#ffdd00" title="Yellow" aria-label="Color: Yellow" role="button" tabindex="0"></span>
          <span class="ann-color-swatch" data-color="#4488ff" style="background:#4488ff" title="Blue" aria-label="Color: Blue" role="button" tabindex="0"></span>
          <span class="ann-color-swatch" data-color="#ffffff" style="background:#ffffff" title="White" aria-label="Color: White" role="button" tabindex="0"></span>
          <span class="ann-color-swatch" data-color="#00cc66" style="background:#00cc66" title="Green" aria-label="Color: Green" role="button" tabindex="0"></span>
          <div class="ann-separator"></div>
          <button class="ann-btn ann-lw-btn active" data-lw="2" title="Thin line">&#x2500;</button>
          <button class="ann-btn ann-lw-btn" data-lw="4" title="Medium line">&#x2501;</button>
          <button class="ann-btn ann-lw-btn" data-lw="6" title="Thick line">&#x2588;</button>
          <div class="ann-separator"></div>
          <button id="undoBtn" class="ann-btn" title="Undo last shape">&#x21A9;&#xFE0F; Undo</button>
          <button id="clearBtn" class="ann-btn" title="Clear all drawings">&#x1F5D1;&#xFE0F; Clear</button>
        </div>
        <div class="video-wrap" id="videoWrap">
          <div id="videoContainer">
            <video id="videoPlayer" controls preload="metadata"></video>
            <canvas id="annotationCanvas"></canvas>
          </div>
        </div>
      </div>
      <div id="resultsContent"></div>
    </div>

    <!-- Uploads list -->
    <h2>Uploads</h2>
    <ul class="uploads-list" id="uploadsList">
      <li class="empty-state">No uploads yet</li>
    </ul>
  </main>

  <script>
    const uploadZone = document.getElementById('uploadZone');
    const fileInput = document.getElementById('fileInput');
    const progressWrap = document.getElementById('progressWrap');
    const progressFill = document.getElementById('progressFill');
    const progressText = document.getElementById('progressText');
    const uploadsList = document.getElementById('uploadsList');
    const resultsPanel = document.getElementById('resultsPanel');
    const resultsTitle = document.getElementById('resultsTitle');
    const resultsContent = document.getElementById('resultsContent');
    const closeResults = document.getElementById('closeResults');
    const reprocessBtn = document.getElementById('reprocessBtn');
    const videoAnnotationSection = document.getElementById('videoAnnotationSection');
    const videoWrap = document.getElementById('videoWrap');
    const videoPlayer = document.getElementById('videoPlayer');
    const exportAllBtn = document.getElementById('exportAllBtn');

    let pollTimer = null;
    let currentVideoId = null;
    let currentResultsId = null;

    // Drag & drop
    uploadZone.addEventListener('click', () => fileInput.click());

    uploadZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadZone.classList.add('dragover');
    });

    uploadZone.addEventListener('dragleave', () => {
      uploadZone.classList.remove('dragover');
    });

    uploadZone.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadZone.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) uploadFile(file);
    });

    fileInput.addEventListener('change', () => {
      if (fileInput.files[0]) uploadFile(fileInput.files[0]);
    });

    // Upload
    function uploadFile(file) {
      if (!file.type.startsWith('video/')) {
        alert('Please select a video file.');
        return;
      }

      const formData = new FormData();
      formData.append('video', file);

      const xhr = new XMLHttpRequest();
      xhr.open('POST', '/upload');
      xhr.timeout = 600000; // 10 minutes for large uploads

      progressWrap.classList.add('active');
      progressFill.style.width = '0%';
      progressText.textContent = 'Uploading...';

      xhr.upload.addEventListener('progress', (e) => {
        if (e.lengthComputable) {
          const pct = Math.round((e.loaded / e.total) * 100);
          progressFill.style.width = pct + '%';
          progressText.textContent = `Uploading... ${pct}%`;
        }
      });

      xhr.addEventListener('load', () => {
        if (xhr.status === 201) {
          progressFill.style.width = '100%';
          progressText.textContent = 'Upload complete — processing...';
          setTimeout(() => {
            progressWrap.classList.remove('active');
          }, 2000);
          loadUploads();
          startPolling();
        } else {
          let message = 'Upload failed (HTTP ' + xhr.status + ')';
          if (xhr.responseText) {
            try {
              const data = JSON.parse(xhr.responseText);
              if (data && typeof data.error === 'string' && data.error.trim()) {
                message = data.error;
              }
            } catch (e) {
              // fall back to generic message
            }
          }
          progressText.textContent = 'Error: ' + message;
          progressFill.style.width = '0%';
        }
      });

      xhr.addEventListener('error', () => {
        progressText.textContent = 'Network error — is the server running?';
      });

      xhr.addEventListener('timeout', () => {
        progressText.textContent = 'Upload timed out — try a smaller file.';
      });

      xhr.send(formData);
      fileInput.value = '';
    }

    // Load uploads list
    async function loadUploads() {
      try {
        const res = await fetch('/uploads');
        const data = await res.json();
        renderUploads(data.uploads);

        const hasActive = data.uploads.some(
          (u) => u.status === 'pending' || u.status === 'processing'
        );
        if (hasActive) {
          startPolling();
          // Auto-refresh results panel if viewing a processing job
          if (currentResultsId) {
            const current = data.uploads.find((u) => u.filename === currentResultsId);
            if (current && (current.status === 'processing' || current.status === 'done')) {
              showResults(currentResultsId);
            }
          }
        } else {
          // Refresh one last time in case status just changed to done
          if (currentResultsId) {
            showResults(currentResultsId);
          }
          stopPolling();
        }
      } catch {
        uploadsList.innerHTML =
          '<li class="empty-state">Could not load uploads</li>';
      }
    }

    function renderUploads(uploads) {
      if (!uploads.length) {
        uploadsList.innerHTML =
          '<li class="empty-state">No uploads yet</li>';
        return;
      }

      uploadsList.innerHTML = uploads
        .map(
          (u) => {
            let badgeText = u.status;
            if (u.status === 'processing' && typeof u.progress === 'number') {
              badgeText = u.progress + '%';
            }
            const isActive = u.status === 'processing' || u.status === 'pending';
            return `
        <li data-id="${esc(u.filename)}">
          <button type="button" class="upload-btn">
            <span class="name">${esc(u.filename)}</span>
            <span class="badge ${esc(u.status)}">${esc(badgeText)}</span>
          </button>
          <button type="button" class="icon-btn delete-btn" title="Delete" ${isActive ? 'disabled' : ''}>&#x1F5D1;</button>
        </li>`;
          }
        )
        .join('');

      uploadsList.querySelectorAll('li[data-id]').forEach((item) => {
        item.querySelector('.upload-btn').addEventListener('click', () => {
          showResults(item.getAttribute('data-id'));
        });

        const delBtn = item.querySelector('.delete-btn');
        delBtn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const id = item.getAttribute('data-id');
          if (!confirm(`Delete "${id}"? This cannot be undone.`)) return;
          try {
            const res = await fetch('/uploads/' + encodeURIComponent(id), { method: 'DELETE' });
            if (!res.ok) {
              const data = await res.json().catch(() => ({}));
              alert('Delete failed: ' + (data.error || res.status));
              return;
            }
            if (currentResultsId === id) {
              resultsPanel.classList.remove('active');
              videoPlayer.pause();
              videoAnnotationSection.style.display = 'none';
              videoPlayer.src = '';
              currentVideoId = null;
              currentResultsId = null;
              reprocessBtn.disabled = true;
              disableAnnotationMode();
            }
            loadUploads();
          } catch {
            alert('Failed to delete upload.');
          }
        });
      });
    }

    // Polling for active jobs
    function startPolling() {
      if (pollTimer) return;
      pollTimer = setInterval(loadUploads, 2000);
    }

    function stopPolling() {
      if (pollTimer) {
        clearInterval(pollTimer);
        pollTimer = null;
      }
    }

    // Show results
    async function showResults(id) {
      currentResultsId = id;
      resultsPanel.classList.add('active');
      resultsTitle.textContent = id;
      resultsContent.innerHTML = '<div class="status-msg">Loading...</div>';
      reprocessBtn.disabled = true;
      exportAllBtn.disabled = true;

      // Load video player
      if (currentVideoId !== id) {
        currentVideoId = id;
        videoPlayer.src = '/video/' + encodeURIComponent(id);
        videoAnnotationSection.style.display = 'block';
        initAnnotationMode();
      }

      try {
        const res = await fetch('/results/' + encodeURIComponent(id));
        if (!res.ok) {
          resultsContent.innerHTML =
            '<div class="no-highlights">No results available yet</div>';
          return;
        }
        const data = await res.json();

        if (data.status === 'processing' || data.status === 'pending') {
          reprocessBtn.disabled = true;
          exportAllBtn.disabled = true;
          const pct = typeof data.progress === 'number' ? data.progress : 0;
          const stageMap = {
            starting: 'Starting...',
            frame_diff: 'Analyzing frames...',
            audio: 'Analyzing audio (Whisper)...',
            color: 'Analyzing color effects...',
            combining: 'Combining signals...',
            done: 'Finishing...',
          };
          const stageText = stageMap[data.stage] || 'Processing...';
          let etaHtml = '';
          if (typeof data.eta_seconds === 'number' && data.eta_seconds > 0 && pct > 0) {
            const mins = Math.floor(data.eta_seconds / 60);
            const secs = data.eta_seconds % 60;
            const etaStr = mins > 0 ? '~' + mins + ' min ' + secs + 's remaining' : '~' + secs + 's remaining';
            etaHtml = '<div class="eta-label">' + esc(etaStr) + '</div>';
          }
          resultsContent.innerHTML =
            '<div class="ml-progress">' +
            '<div class="pct-label">' + pct + '%</div>' +
            '<div class="bar-track"><div class="bar-fill" style="width:' + pct + '%"></div></div>' +
            '<div class="stage-label">' + esc(stageText) + '</div>' +
            etaHtml +
            '</div>';
          return;
        }

        if (data.status === 'error') {
          reprocessBtn.disabled = false;
          exportAllBtn.disabled = true;
          resultsContent.innerHTML =
            '<div class="no-highlights">&#9888; Error: ' +
            esc(data.error || 'unknown error') +
            '</div>';
          return;
        }

        if (!data.highlights || !data.highlights.length) {
          reprocessBtn.disabled = false;
          exportAllBtn.disabled = true;
          resultsContent.innerHTML =
            '<div class="no-highlights">No highlights detected</div>';
          return;
        }

        const highlights = data.highlights;
        reprocessBtn.disabled = false;
        exportAllBtn.disabled = false;
        const maxScore = highlights.reduce(
          (max, h) => (typeof h.score === 'number' && h.score > max ? h.score : max), 0
        );

        resultsContent.innerHTML = highlights
          .map((h) => {
            const raw = typeof h.score === 'number' ? h.score : 0;
            const barWidth = maxScore > 0 ? Math.min(100, Math.max(0, (raw / maxScore) * 100)) : 0;
            const ts = Number.isFinite(Number(h.timestamp)) ? Number(h.timestamp) : 0;
            const rawType = typeof h.type === 'string' && h.type.trim() ? h.type : 'action';
            const safeTypeClass = rawType.toLowerCase().replace(/[^a-z0-9_-]/g, '') || 'action';
            const typeLabel = rawType.replace(/_/g, ' ');
            const sources = Array.isArray(h.sources) ? h.sources.map(String).join(' + ') : '';
            return `
          <div class="highlight-card" data-time="${ts}">
            <div class="time">${formatTime(ts)}</div>
            <span class="type-badge type-${safeTypeClass}">${esc(typeLabel)}</span>
            <div class="score-bar"><div class="fill" style="width:${barWidth}%"></div></div>
            <div class="score-val">${raw}</div>
            ${sources ? `<div class="sources">${esc(sources)}</div>` : ''}
            <a class="icon-btn clip-btn" href="/clip/${encodeURIComponent(id)}?t=${ts}" download title="Export clip">&#x2702;&#xFE0F;</a>
          </div>`;
          })
          .join('');

        // Attach click handlers to seek video (exclude clip button clicks)
        resultsContent.querySelectorAll('.highlight-card[data-time]').forEach((card) => {
          card.addEventListener('click', (e) => {
            if (e.target.closest('.clip-btn')) return;
            const time = parseFloat(card.getAttribute('data-time'));
            if (!isNaN(time)) {
              videoPlayer.currentTime = time;
              videoPlayer.play();
              videoAnnotationSection.scrollIntoView({ behavior: 'smooth' });
            }
          });
        });
      } catch {
        resultsContent.innerHTML =
          '<div class="no-highlights">Failed to load results</div>';
      }
    }

    closeResults.addEventListener('click', () => {
      resultsPanel.classList.remove('active');
      videoPlayer.pause();
      videoAnnotationSection.style.display = 'none';
      videoPlayer.src = '';
      currentVideoId = null;
      currentResultsId = null;
      reprocessBtn.disabled = true;
      exportAllBtn.disabled = true;
      disableAnnotationMode();
    });

    reprocessBtn.addEventListener('click', async () => {
      if (!currentResultsId) return;
      reprocessBtn.disabled = true;
      try {
        const res = await fetch('/reprocess/' + encodeURIComponent(currentResultsId), { method: 'POST' });
        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          alert(`Reprocess failed: ${data.error || String(res.status)}`);
          reprocessBtn.disabled = false;
          return;
        }
        loadUploads();
        showResults(currentResultsId);
      } catch {
        alert('Failed to start reprocessing.');
        reprocessBtn.disabled = false;
      }
    });

    exportAllBtn.addEventListener('click', () => {
      if (!currentResultsId) return;
      window.location.href = '/clips/zip/' + encodeURIComponent(currentResultsId);
    });

    // Helpers
    function formatTime(sec) {
      const m = Math.floor(sec / 60);
      const s = Math.floor(sec % 60);
      return m + ':' + String(s).padStart(2, '0');
    }

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    // =====================
    // ANNOTATION OVERLAY
    // =====================

    const annotationCanvas = document.getElementById('annotationCanvas');
    const annotationCtx = annotationCanvas.getContext('2d');
    const annotationToolbar = document.getElementById('annotationToolbar');
    const drawToggleBtn = document.getElementById('drawToggleBtn');
    const undoBtn = document.getElementById('undoBtn');
    const clearBtn = document.getElementById('clearBtn');
    const videoContainer = document.getElementById('videoContainer');

    const ann = {
      tool: 'freehand',
      color: '#ff3333',
      lineWidth: 2,
      shapes: [],
      currentShape: null,
      drawing: false,
      enabled: false,
    };

    function syncCanvasSize() {
      const rect = videoContainer.getBoundingClientRect();
      if (rect.width > 0 && rect.height > 0) {
        annotationCanvas.width = rect.width;
        annotationCanvas.height = rect.height;
        redrawAll();
      }
    }

    const canvasResizeObserver = new ResizeObserver(syncCanvasSize);

    function initAnnotationMode() {
      ann.shapes = [];
      ann.currentShape = null;
      ann.drawing = false;
      ann.enabled = false;
      annotationCanvas.classList.remove('drawing-on');
      annotationToolbar.classList.remove('drawing-on');
      drawToggleBtn.textContent = '\uD83D\uDD8A\uFE0F Draw';
      drawToggleBtn.classList.remove('active');
      annotationCtx.clearRect(0, 0, annotationCanvas.width, annotationCanvas.height);
      canvasResizeObserver.observe(videoContainer);
      setTimeout(syncCanvasSize, 0);
    }

    function disableAnnotationMode() {
      canvasResizeObserver.unobserve(videoContainer);
      ann.shapes = [];
      ann.currentShape = null;
      ann.drawing = false;
      ann.enabled = false;
      annotationCanvas.classList.remove('drawing-on');
      annotationToolbar.classList.remove('drawing-on');
      drawToggleBtn.textContent = '\uD83D\uDD8A\uFE0F Draw';
      drawToggleBtn.classList.remove('active');
      annotationCtx.clearRect(0, 0, annotationCanvas.width, annotationCanvas.height);
    }

    drawToggleBtn.addEventListener('click', () => {
      ann.enabled = !ann.enabled;
      if (ann.enabled) {
        annotationCanvas.classList.add('drawing-on');
        annotationToolbar.classList.add('drawing-on');
        drawToggleBtn.textContent = '\u270B Move';
        drawToggleBtn.classList.add('active');
      } else {
        annotationCanvas.classList.remove('drawing-on');
        annotationToolbar.classList.remove('drawing-on');
        drawToggleBtn.textContent = '\uD83D\uDD8A\uFE0F Draw';
        drawToggleBtn.classList.remove('active');
      }
    });

    document.querySelectorAll('.ann-tool-btn').forEach((btn) => {
      btn.addEventListener('click', () => {
        ann.tool = btn.getAttribute('data-tool');
        document.querySelectorAll('.ann-tool-btn').forEach((b) => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });

    document.querySelectorAll('.ann-color-swatch').forEach((swatch) => {
      swatch.addEventListener('click', () => {
        ann.color = swatch.getAttribute('data-color');
        document.querySelectorAll('.ann-color-swatch').forEach((s) => s.classList.remove('active'));
        swatch.classList.add('active');
      });
      swatch.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
          swatch.click();
        }
      });
    });

    document.querySelectorAll('.ann-lw-btn').forEach((btn) => {
      btn.addEventListener('click', () => {
        ann.lineWidth = parseInt(btn.getAttribute('data-lw'), 10);
        document.querySelectorAll('.ann-lw-btn').forEach((b) => b.classList.remove('active'));
        btn.classList.add('active');
      });
    });

    undoBtn.addEventListener('click', () => {
      ann.shapes.pop();
      redrawAll();
    });

    clearBtn.addEventListener('click', () => {
      ann.shapes = [];
      ann.currentShape = null;
      ann.drawing = false;
      annotationCtx.clearRect(0, 0, annotationCanvas.width, annotationCanvas.height);
    });

    function getPoint(e) {
      const rect = annotationCanvas.getBoundingClientRect();
      const src = e.touches ? e.touches[0] : e;
      return {
        x: (src.clientX - rect.left) * (annotationCanvas.width / rect.width),
        y: (src.clientY - rect.top) * (annotationCanvas.height / rect.height),
      };
    }

    function onDrawStart(e) {
      if (!ann.enabled) return;
      e.preventDefault();
      const pt = getPoint(e);

      if (ann.tool === 'text') {
        const text = prompt('Enter annotation text:');
        if (text && text.trim()) {
          ann.shapes.push({
            type: 'text',
            points: [pt],
            color: ann.color,
            lineWidth: ann.lineWidth,
            text: text.trim(),
          });
          redrawAll();
        }
        return;
      }

      ann.drawing = true;
      ann.currentShape = {
        type: ann.tool,
        points: [pt],
        color: ann.color,
        lineWidth: ann.lineWidth,
      };
    }

    function onDrawMove(e) {
      if (!ann.enabled || !ann.drawing || !ann.currentShape) return;
      e.preventDefault();
      const pt = getPoint(e);
      if (ann.currentShape.type === 'freehand') {
        ann.currentShape.points.push(pt);
      } else {
        if (ann.currentShape.points.length === 1) {
          ann.currentShape.points.push(pt);
        } else {
          ann.currentShape.points[1] = pt;
        }
      }
      redrawAll();
    }

    function onDrawEnd(e) {
      if (!ann.enabled || !ann.drawing || !ann.currentShape) return;
      if (e.cancelable) e.preventDefault();
      const minPoints = ann.currentShape.type === 'freehand' ? 1 : 2;
      if (ann.currentShape.points.length >= minPoints) {
        ann.shapes.push(ann.currentShape);
      }
      ann.currentShape = null;
      ann.drawing = false;
      redrawAll();
    }

    annotationCanvas.addEventListener('mousedown', onDrawStart);
    annotationCanvas.addEventListener('mousemove', onDrawMove);
    annotationCanvas.addEventListener('mouseup', onDrawEnd);
    annotationCanvas.addEventListener('mouseleave', onDrawEnd);
    annotationCanvas.addEventListener('touchstart', onDrawStart, { passive: false });
    annotationCanvas.addEventListener('touchmove', onDrawMove, { passive: false });
    annotationCanvas.addEventListener('touchend', onDrawEnd);
    annotationCanvas.addEventListener('touchcancel', onDrawEnd);

    function redrawAll() {
      annotationCtx.clearRect(0, 0, annotationCanvas.width, annotationCanvas.height);
      for (const shape of ann.shapes) {
        drawShape(annotationCtx, shape);
      }
      if (ann.currentShape) {
        drawShape(annotationCtx, ann.currentShape);
      }
    }

    function drawShape(ctx, shape) {
      if (!shape || !shape.points || !shape.points.length) return;
      ctx.save();
      ctx.strokeStyle = shape.color;
      ctx.fillStyle = shape.color;
      ctx.lineWidth = shape.lineWidth;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      switch (shape.type) {
        case 'freehand':
          ctx.beginPath();
          if (shape.points.length === 1) {
            ctx.arc(shape.points[0].x, shape.points[0].y, shape.lineWidth / 2, 0, Math.PI * 2);
            ctx.fill();
          } else {
            ctx.moveTo(shape.points[0].x, shape.points[0].y);
            for (let i = 1; i < shape.points.length; i++) {
              ctx.lineTo(shape.points[i].x, shape.points[i].y);
            }
            ctx.stroke();
          }
          break;

        case 'arrow': {
          if (shape.points.length < 2) break;
          const [start, end] = shape.points;
          const headLen = Math.max(15, shape.lineWidth * 4);
          const angle = Math.atan2(end.y - start.y, end.x - start.x);
          ctx.beginPath();
          ctx.moveTo(start.x, start.y);
          ctx.lineTo(end.x, end.y);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(end.x, end.y);
          ctx.lineTo(
            end.x - headLen * Math.cos(angle - Math.PI / 6),
            end.y - headLen * Math.sin(angle - Math.PI / 6)
          );
          ctx.moveTo(end.x, end.y);
          ctx.lineTo(
            end.x - headLen * Math.cos(angle + Math.PI / 6),
            end.y - headLen * Math.sin(angle + Math.PI / 6)
          );
          ctx.stroke();
          break;
        }

        case 'circle': {
          if (shape.points.length < 2) break;
          const [center, edgePoint] = shape.points;
          const r = Math.hypot(edgePoint.x - center.x, edgePoint.y - center.y);
          ctx.beginPath();
          ctx.arc(center.x, center.y, r, 0, Math.PI * 2);
          ctx.stroke();
          break;
        }

        case 'rect': {
          if (shape.points.length < 2) break;
          const [p1, p2] = shape.points;
          ctx.beginPath();
          ctx.strokeRect(p1.x, p1.y, p2.x - p1.x, p2.y - p1.y);
          break;
        }

        case 'text': {
          if (!shape.text) break;
          const fontSize = shape.lineWidth * 5 + 10;
          ctx.font = `bold ${fontSize}px -apple-system, BlinkMacSystemFont, sans-serif`;
          ctx.fillText(shape.text, shape.points[0].x, shape.points[0].y);
          break;
        }

        default:
          break;
      }

      ctx.restore();
    }

    // Initial load
    loadUploads();
  </script>
</body>
</html>
