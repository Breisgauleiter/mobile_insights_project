name: Copilot Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  copilot-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - name: Copilot Review Reminder
        uses: actions/github-script@v7
        with:
          script: |
            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            const hasCopilotReview = reviews.some(r => r.user?.login === 'copilot[bot]');
            if (!hasCopilotReview) {
              core.info('No Copilot review yet — remember to request one via the PR UI.');
            }
